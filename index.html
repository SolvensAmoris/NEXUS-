<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | Pro</title>
    <!-- Tailwind para diseño profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; font-family: sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="h-screen flex flex-col">
    <!-- Header -->
    <header class="p-4 glass-panel border-b border-emerald-900/30 flex justify-between items-center">
        <h1 class="text-xl font-black text-emerald-400">NEXUS OS</h1>
        <div id="cash-flow" class="font-bold text-amber-400">$0.00</div>
    </header>

    <!-- Contenedor del Chat -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></main>

    <!-- Footer / Input -->
    <footer class="p-4 bg-[#0B0F19] border-t border-emerald-900/30">
        <form id="nexus-form" class="flex gap-2">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ej: Venta de 1000 a Carlos..." class="flex-1 bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            <button type="submit" class="bg-emerald-600 text-white rounded-xl px-4 py-3 font-bold">Enviar</button>
        </form>
    </footer>

    <!-- Script Principal -->
    <script src="app.js"></script>
</body>
</html>
